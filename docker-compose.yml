services:
  scrub:
    build: .
    runtime: ${SCRUB_RUNTIME:-runc}
    network_mode: none # no network egress
    cap_drop:
      - ALL
    security_opt:
      - no-new-privileges:true
    read_only: true
    tmpfs:
      - /tmp:size=2g,mode=1777
    environment:
      SCRUB_WORKERS: "" # default: ncpu*2-1
      SCRUB_TIMEOUT: "60"
      SCRUB_MEMORY_LIMIT: "512"
    volumes:
      # Source: read-only — never modified
      - type: bind
        source: ${SCRUB_SOURCE:-./data/source}
        target: /data/source
        read_only: true
      # Extracts: archive members extracted here (source may be read-only)
      - type: bind
        source: ${SCRUB_EXTRACTS:-./data/extracts}
        target: /data/extracts
      # Clean output
      - type: bind
        source: ${SCRUB_CLEAN:-./data/clean}
        target: /data/clean
      # Error manifests (processing failures)
      - type: bind
        source: ${SCRUB_ERRORS:-./data/errors}
        target: /data/errors
      # Logs
      - type: bind
        source: ${SCRUB_LOGS:-./data/logs}
        target: /var/log/scrub

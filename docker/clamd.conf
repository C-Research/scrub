# ClamAV daemon configuration for scrub sidecar

LocalSocket /run/clamav/clamd.sock
LocalSocketMode 660
LocalSocketGroup clamav

# Database location (persistent named volume)
DatabaseDirectory /var/lib/clamav

# Logging
LogFile /var/log/clamav/clamd.log
LogTime yes
LogVerbose no

# Limits
MaxScanSize 200M
MaxFileSize 200M
MaxRecursion 10
MaxFiles 1000

# Disable unnecessary features
ScanOLE2 yes
ScanPDF yes
ScanSWF no
ScanXMLDOCS yes
ScanHWP3 no

# Stream settings
StreamMaxLength 200M
